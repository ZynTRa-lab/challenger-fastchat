<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenger Projesi - Canlı</title>
    <style>
        body { background: #2f3136; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 280px; background: #202225; display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #36393f; }
        
        /* Mesaj Alanı */
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; }
        .msg { background: #40444b; padding: 10px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #5865f2; }
        
        /* Giriş Alanı */
        #input-area { padding: 20px; background: #2f3136; }
        #chat-in { width: 95%; background: #40444b; border: none; color: white; padding: 12px; border-radius: 5px; outline: none; }

        /* Arkadaşlık Bölümü */
        .friends-box { padding: 20px; border-top: 1px solid #2f3136; margin-top: auto; }
        #friends-list { list-style: none; padding: 0; }
        #friends-list li { background: #4f545c; padding: 8px; border-radius: 4px; margin-bottom: 5px; font-size: 14px; }
        .add-friend-ui { display: flex; gap: 5px; margin-top: 10px; }
        .add-friend-ui input { flex: 1; background: #202225; border: 1px solid #444; color: white; padding: 5px; border-radius: 3px; }
        .add-friend-ui button { background: #3ba55e; border: none; color: white; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-weight: bold; }

        /* Bildirim Modalı */
        #request-modal { display: none; position: fixed; top: 20px; right: 20px; background: #5865f2; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 9999; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid #2f3136;">
            <h2 style="margin:0; color: #5865f2;">CHALLENGER</h2>
            <p style="font-size: 12px; color: #b9bbbe;">Hoş geldin: <strong id="my-name">...</strong></p>
        </div>

        <div class="friends-box">
            <h4 style="margin: 0 0 10px 0; color: #8e9297;">ARKADAŞLAR</h4>
            <ul id="friends-list"></ul>
            <div class="add-friend-ui">
                <input type="text" id="target-user" placeholder="Kullanıcı adı...">
                <button onclick="sendRequest()">EKLE</button>
            </div>
        </div>
    </div>

    <div id="chat-area">
        <ul id="messages"></ul>
        <div id="input-area">
            <input type="text" id="chat-in" placeholder="Mesaj gönder..." onkeypress="handleChat(event)">
        </div>
    </div>

    <div id="request-modal">
        <p id="request-msg" style="margin:0 0 15px 0; font-weight: bold;"></p>
        <button onclick="answer(true)" style="background: white; color: #5865f2; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">KABUL ET</button>
        <button onclick="answer(false)" style="background: transparent; color: white; border:1px solid white; padding:8px 15px; border-radius:5px; cursor:pointer; margin-left:10px;">REDDET</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const myName = prompt("Kullanıcı Adınız Nedir?") || "Anonim";
        document.getElementById('my-name').innerText = myName;
        
        // Sunucuya ismimizi kaydet
        socket.emit('register', myName);

        // Mesajlaşma Sistemi
        function handleChat(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('chat-in');
                if(input.value.trim() !== "") {
                    socket.emit('chat message', { user: myName, text: input.value });
                    input.value = "";
                }
            }
        }

        socket.on('chat message', (data) => {
            const li = document.createElement('li');
            li.className = 'msg';
            li.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
            document.getElementById('messages').appendChild(li);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        // ARKADAŞLIK SİSTEMİ
        let pendingUser = "";

        function sendRequest() {
            const target = document.getElementById('target-user').value.trim();
            if(target && target !== myName) {
                socket.emit('send friend request', { from: myName, to: target });
                alert(target + " kullanıcısına istek gönderildi!");
                document.getElementById('target-user').value = "";
            }
        }

        socket.on('receive friend request', (data) => {
            pendingUser = data.from;
            document.getElementById('request-msg').innerText = data.from + " seni eklemek istiyor!";
            document.getElementById('request-modal').style.display = 'block';
        });

        function answer(status) {
            socket.emit('respond friend request', { from: pendingUser, to: myName, accepted: status });
            document.getElementById('request-modal').style.display = 'none';
        }

        socket.on('request response', (data) => {
            if(data.accepted) {
                alert(data.from + " isteğini kabul etti! 🎉");
                const li = document.createElement('li');
                li.innerText = "👤 " + data.from;
                document.getElementById('friends-list').appendChild(li);
            } else {
                alert(data.from + " isteğini reddetti. ❌");
            }
        });
    </script>
</body>
</html>
