<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Challenger Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #36393f; color: #dcddde; font-family: sans-serif; margin:0; display:flex; height:100vh; }
        
        #auth-screen { position:fixed; inset:0; background:#2f3136; z-index:999; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:#36393f; padding:30px; border-radius:8px; width:350px; text-align:center; }
        
        #app { display:none; flex:1; width:100%; }
        #guilds { width:70px; background:#202225; padding:10px; display:flex; flex-direction:column; gap:10px; }
        #channels { width:240px; background:#2f3136; display:flex; flex-direction:column; }
        #chat { flex:1; display:flex; flex-direction:column; background:#36393f; }

        .guild-icon { width:50px; height:50px; background:#5865f2; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; cursor:pointer; }
        .channel-btn { padding:10px; margin:2px 10px; border-radius:4px; cursor:pointer; color:#8e9297; }
        .channel-btn.active { background:#4f545c; color:white; }

        #msg-list { flex:1; overflow-y:auto; padding:20px; list-style:none; margin:0; }
        .msg-input-area { padding:20px; }
        input { width:100%; background:#40444b; border:none; color:white; padding:12px; border-radius:8px; outline:none; margin-bottom:10px; }
        button { width:100%; padding:10px; background:#5865f2; color:white; border:none; border-radius:4px; cursor:pointer; margin-bottom:5px; }

        .msg-item { display:flex; margin-bottom:15px; }
        .avatar-small { width:40px; height:40px; background:#4f545c; border-radius:50%; margin-right:15px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:white">Challenger</h2>
            <input type="text" id="user-in" placeholder="Kullanıcı Adı">
            <input type="password" id="pass-in" placeholder="Şifre">
            <button onclick="auth('login')">Giriş Yap</button>
            <button onclick="auth('register')" style="background:#4e5058">Kayıt Ol</button>
            <p id="error-msg" style="color:#f04747; font-size:12px"></p>
        </div>
    </div>

    <div id="app">
        <div id="guilds"><div class="guild-icon">C</div></div>
        <div id="channels">
            <div style="padding:15px; color:white; font-weight:bold">CHALLENGER SERVER</div>
            <div class="channel-btn active" onclick="joinRoom('genel', this)"># genel</div>
            <div class="channel-btn" onclick="joinRoom('oyun', this)"># oyun</div>
            <div class="channel-btn" onclick="joinRoom('yardım', this)"># yardım</div>
        </div>
        <div id="chat">
            <ul id="msg-list"></ul>
            <div class="msg-input-area">
                <input type="text" id="main-input" placeholder="Mesaj yaz..." onkeypress="sendMsg(event)">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "";
        let currentRoom = "genel";

        function auth(type) {
            const username = document.getElementById('user-in').value;
            const password = document.getElementById('pass-in').value;
            socket.emit('auth', { type, username, password });
        }

        socket.on('auth_success', (data) => {
            myUser = data.username;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            socket.emit('login_complete', myUser);
            joinRoom('genel');
        });

        socket.on('auth_error', (msg) => {
            document.getElementById('error-msg').innerText = msg;
        });

        function joinRoom(room, el) {
            currentRoom = room;
            document.getElementById('msg-list').innerHTML = ""; // Temizle
            socket.emit('join_room', room);
            if(el) {
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
        }

        socket.on('load_history', (messages) => {
            messages.forEach(msg => appendMessage(msg));
        });

        function sendMsg(e) {
            if(e.key === 'Enter' && e.target.value.trim() !== "") {
                socket.emit('chat_message', { user: myUser, text: e.target.value, room: currentRoom });
                e.target.value = "";
            }
        }

        socket.on('chat_message', (data) => {
            appendMessage(data);
        });

        function appendMessage(data) {
            const list = document.getElementById('msg-list');
            const li = document.createElement('li');
            li.className = "msg-item";
            const time = new Date(data.timestamp || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            li.innerHTML = `
                <div class="avatar-small"></div>
                <div>
                    <strong style="color:white">${data.user}</strong> <span style="color:#72767d; font-size:12px">${time}</span>
                    <div style="color:#dcddde; margin-top:4px;">${data.text}</div>
                </div>
            `;
            list.appendChild(li);
            list.scrollTop = list.scrollHeight;
        }
    </script>
</body>
</html>s
