<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Challenger Pro - Discord Klonu</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #36393f; color: #dcddde; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; display:flex; height:100vh; overflow:hidden; }
        
        /* Auth Screen */
        #auth-screen { position:fixed; inset:0; background:#2f3136; z-index:999; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:#36393f; padding:40px; border-radius:8px; width:400px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .auth-box h2 { color:white; text-align:center; margin-bottom:20px; }
        
        /* App Layout */
        #app { display:none; flex:1; width:100%; }
        #guilds { width:72px; background:#202225; padding:12px 0; display:flex; flex-direction:column; align-items:center; gap:8px; }
        #channels { width:240px; background:#2f3136; display:flex; flex-direction:column; }
        #chat { flex:1; display:flex; flex-direction:column; background:#36393f; }

        .guild-icon { width:48px; height:48px; background:#5865f2; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; transition: 0.2s; }
        .guild-icon:hover { border-radius:15px; background:#4752c4; }

        .channel-btn { padding:8px 10px; margin:2px 8px; border-radius:4px; cursor:pointer; color:#8e9297; font-weight:500; }
        .channel-btn:hover { background:#393c43; color:#dcddde; }
        .channel-btn.active { background:#4f545c; color:white; }

        #msg-list { flex:1; overflow-y:auto; padding:20px; list-style:none; margin:0; }
        .msg-box { padding:20px; background:#36393f; }
        
        input { width:100%; background:#40444b; border:none; color:#dcddde; padding:12px; border-radius:8px; outline:none; margin-bottom:10px; }
        button.btn-primary { background:#5865f2; color:white; border:none; padding:12px; width:100%; border-radius:4px; cursor:pointer; font-weight:bold; margin-top:5px; transition:0.2s; }
        button.btn-primary:hover { background:#4752c4; }

        .user-footer { margin-top:auto; background:#232428; padding:10px; display:flex; align-items:center; }
        .avatar { width:32px; height:32px; background:#5865f2; border-radius:50%; margin-right:10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>Challenger'a Giriş</h2>
            <input type="text" id="user-in" placeholder="Kullanıcı Adı">
            <input type="password" id="pass-in" placeholder="Şifre">
            <button class="btn-primary" onclick="auth('login')">Giriş Yap</button>
            <button class="btn-primary" onclick="auth('register')" style="background:#4e5058">Kayıt Ol</button>
            <p id="error-msg" style="color:#f04747; font-size:12px; margin-top:10px; text-align:center;"></p>
        </div>
    </div>

    <div id="app">
        <div id="guilds">
            <div class="guild-icon">C</div>
        </div>

        <div id="channels">
            <div style="padding:15px; color:white; font-weight:bold; border-bottom:1px solid #232428 shadow">CHALLENGER SERVER</div>
            <div style="padding:20px 10px 10px; color:#8e9297; font-size:12px; font-weight:bold;">METİN KANALLARI</div>
            <div class="channel-btn active" onclick="joinRoom('genel', this)"># genel</div>
            <div class="channel-btn" onclick="joinRoom('oyun', this)"># oyun</div>
            <div class="channel-btn" onclick="joinRoom('yardım', this)"># yardım</div>
            
            <div class="user-footer">
                <div class="avatar"></div>
                <div>
                    <div id="my-name" style="color:white; font-size:14px; font-weight:bold">...</div>
                    <div id="my-role" style="color:#b9bbbe; font-size:11px">Üye</div>
                </div>
            </div>
        </div>

        <div id="chat">
            <ul id="msg-list"></ul>
            <div class="msg-box">
                <input type="text" id="main-input" placeholder="Mesaj gönder..." onkeypress="sendMsg(event)">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "";
        let currentRoom = "genel";

        function auth(type) {
            const username = document.getElementById('user-in').value;
            const password = document.getElementById('pass-in').value;
            if(!username || !password) return alert("Alanları doldur kanka!");
            socket.emit('auth', { type, username, password });
        }

        socket.on('auth_success', (data) => {
            myUser = data.username;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-name').innerText = myUser;
            document.getElementById('my-role').innerText = data.role;
            socket.emit('login_complete', myUser);
            joinRoom('genel');
        });

        socket.on('auth_error', (msg) => {
            document.getElementById('error-msg').innerText = msg;
        });

        function joinRoom(room, el) {
            currentRoom = room;
            socket.emit('join_room', room);
            if(el) {
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            document.getElementById('msg-list').innerHTML = `<li style="color:#72767d; text-align:center; margin: 20px 0;">--- # ${room} kanalının başlangıcı ---</li>`;
        }

        function sendMsg(e) {
            if(e.key === 'Enter' && e.target.value.trim() !== "") {
                socket.emit('chat_message', { user: myUser, text: e.target.value, room: currentRoom });
                e.target.value = "";
            }
        }

        socket.on('chat_message', (data) => {
            const li = document.createElement('li');
            li.style.marginBottom = "20px";
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            li.innerHTML = `
                <div style="display:flex; align-items:flex-start;">
                    <div style="width:40px; height:40px; background:#4f545c; border-radius:50%; margin-right:15px;"></div>
                    <div>
                        <strong style="color:white; margin-right:8px;">${data.user}</strong>
                        <span style="color:#72767d; font-size:12px;">${time}</span>
                        <div style="color:#dcddde; margin-top:4px;">${data.text}</div>
                    </div>
                </div>
            `;
            document.getElementById('msg-list').appendChild(li);
            document.getElementById('msg-list').scrollTop = document.getElementById('msg-list').scrollHeight;
        });
    </script>
</body>
</html>
