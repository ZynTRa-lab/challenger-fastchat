<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Challenger Pro - Discord Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #36393f; color: #dcddde; font-family: sans-serif; margin:0; display:flex; height:100vh; }
        
        /* Giriş Ekranı */
        #auth-screen { position:fixed; inset:0; background:#2f3136; z-index:999; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:#36393f; padding:30px; border-radius:8px; width:350px; text-align:center; }
        
        /* Ana Panel */
        #app { display:none; flex:1; width:100%; }
        #guilds { width:70px; background:#202225; padding:12px 0; display:flex; flex-direction:column; align-items:center; }
        #channels { width:240px; background:#2f3136; display:flex; flex-direction:column; }
        #chat { flex:1; display:flex; flex-direction:column; }
        
        .channel-btn { padding:10px; margin:2px 10px; border-radius:4px; cursor:pointer; color:#8e9297; }
        .channel-btn:hover { background:#393c43; color:white; }
        .channel-btn.active { background:#42464d; color:white; }

        #msg-list { flex:1; overflow-y:auto; padding:20px; list-style:none; }
        .msg-box { padding:15px; background:#36393f; }
        input { width:100%; background:#40444b; border:none; color:white; padding:12px; border-radius:8px; outline:none; }
        button.primary { background:#5865f2; color:white; border:none; padding:10px; width:100%; border-radius:4px; cursor:pointer; margin-top:10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:white">Hoş Geldin!</h2>
            <input type="text" id="user-in" placeholder="Kullanıcı Adı" style="margin-bottom:10px">
            <input type="password" id="pass-in" placeholder="Şifre">
            <button class="primary" onclick="auth('login')">Giriş Yap</button>
            <button class="primary" onclick="auth('register')" style="background:#4e5058">Kayıt Ol</button>
        </div>
    </div>

    <div id="app">
        <div id="guilds">
            <div style="width:48px; height:48px; background:#5865f2; border-radius:15px; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer">C</div>
        </div>

        <div id="channels">
            <div style="padding:15px; color:white; font-weight:bold; border-bottom:1px solid #26272b">CHALLENGER SERVER</div>
            <div style="padding:10px; color:#8e9297; font-size:12px; margin-top:10px">METİN KANALLARI</div>
            <div class="channel-btn active" onclick="joinRoom('genel', this)"># genel</div>
            <div class="channel-btn" onclick="joinRoom('oyun', this)"># oyun</div>
            <div class="channel-btn" onclick="joinRoom('yardım', this)"># yardım</div>
            
            <div style="margin-top:auto; background:#292b2f; padding:10px; display:flex; align-items:center">
                <div style="width:32px; height:32px; background:#4f545c; border-radius:50%; margin-right:10px"></div>
                <div>
                    <div id="my-name" style="color:white; font-size:14px; font-weight:bold">...</div>
                    <div id="my-role" style="color:#b9bbbe; font-size:12px">Üye</div>
                </div>
            </div>
        </div>

        <div id="chat">
            <ul id="msg-list"></ul>
            <div class="msg-box">
                <input type="text" id="main-input" placeholder="Mesaj gönder..." onkeypress="sendMsg(event)">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "";
        let currentRoom = "genel";

        function auth(type) {
            const username = document.getElementById('user-in').value;
            const password = document.getElementById('pass-in').value;
            socket.emit('auth', { type, username, password });
        }

        socket.on('auth_success', (data) => {
            myUser = data.username;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-name').innerText = myUser;
            document.getElementById('my-role').innerText = data.role;
            socket.emit('login_complete', myUser);
            joinRoom('genel');
        });

        socket.on('auth_error', (msg) => alert(msg));

        function joinRoom(room, el) {
            currentRoom = room;
            socket.emit('join_room', room);
            if(el) {
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            document.getElementById('msg-list').innerHTML = `<li style="color:#8e9297"># ${room} kanalına hoş geldin!</li>`;
        }

        function sendMsg(e) {
            if(e.key === 'Enter') {
                const text = e.target.value;
                socket.emit('chat_message', { user: myUser, text, room: currentRoom });
                e.target.value = "";
            }
        }

        socket.on('chat_message', (data) => {
            const li = document.createElement('li');
            li.style.marginBottom = "15px";
            li.innerHTML = `<strong style="color:white">${data.user}</strong> <span style="color:#72767d; font-size:12px">${new Date().toLocaleTimeString()}</span><br>${data.text}`;
            document.getElementById('msg-list').appendChild(li);
            document.getElementById('msg-list').scrollTop = document.getElementById('msg-list').scrollHeight;
        });
    </script>
</body>
</html>
