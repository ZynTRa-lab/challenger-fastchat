<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Challenger Pro</title>
    <style>
        :root { --primary: #5865f2; --bg: #36393f; --sidebar: #2f3136; --dark: #202225; --text: #dcddde; --danger: #ed4245; }
        * { box-sizing: border-box; transition: 0.2s; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin:0; display:flex; height:100vh; overflow:hidden; }
        
        #auth-screen { position:fixed; inset:0; background:var(--sidebar); z-index:2000; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:var(--bg); padding:40px; border-radius:8px; width:400px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #app { display:none; flex:1; width:100%; }
        
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1500; display:none; align-items:center; justify-content:center; }
        .modal { background:var(--bg); padding:24px; border-radius:8px; width:440px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align:center; }

        .avatar-circle { width:80px; height:80px; border-radius:50%; background:var(--primary); margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:30px; color:white; overflow:hidden; border: 3px solid #232428; }
        .avatar-circle img { width:100%; height:100%; object-fit: cover; }

        #guilds { width:72px; background:var(--dark); padding:12px 0; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .guild-icon { width:48px; height:48px; background:var(--bg); border-radius:50%; color:var(--text); display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; overflow:hidden; }
        .guild-icon:hover { border-radius:15px; background:var(--primary); color:white; }

        #channels { width:240px; background:var(--sidebar); display:flex; flex-direction:column; }
        .side-header { padding:15px; font-weight:bold; color:white; border-bottom:1px solid #232428; display:flex; justify-content:space-between; align-items:center; }
        
        .list-item { padding:10px; margin:2px 8px; border-radius:4px; cursor:pointer; color:#8e9297; display:flex; align-items:center; gap:10px; }
        .list-item:hover { background:#393c43; color:white; }

        #chat { flex:1; display:flex; flex-direction:column; background:var(--bg); }
        #msg-list { flex:1; overflow-y:auto; padding:20px; list-style:none; margin:0; }
        .msg-box { padding:20px; }

        input, textarea { width:100%; background:#40444b; border:none; color:white; padding:12px; border-radius:8px; outline:none; margin-top:5px; }
        button { padding:10px; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; margin-top:10px; }
        button.danger { background: var(--danger); }
        button.sec { background: #4e5058; }

        .user-footer { background:#232428; padding:10px; display:flex; align-items:center; gap:10px; margin-top:auto; cursor:pointer; }
        .small-avatar { width:32px; height:32px; border-radius:50%; background:var(--primary); overflow:hidden; }
        .small-avatar img { width:100%; height:100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:white">Challenger</h2>
            <input type="text" id="user-in" placeholder="Kullanıcı Adı">
            <input type="password" id="pass-in" placeholder="Şifre" style="margin-top:10px">
            <div style="margin-top:15px; color:#b9bbbe; font-size:13px; text-align:left">
                <input type="checkbox" id="rem-check"> Beni Hatırla
            </div>
            <button style="width:100%; margin-top:15px" onclick="auth('login')">Giriş Yap</button>
            <button class="sec" style="width:100%; margin-top:10px" onclick="auth('register')">Kayıt Ol</button>
            <p id="auth-err" style="color:var(--danger); font-size:12px"></p>
        </div>
    </div>

    <div class="modal-overlay" id="my-profile-modal">
        <div class="modal">
            <h3>Profilini Düzenle</h3>
            <div class="avatar-circle" id="my-avatar-preview">?</div>
            <input type="file" id="avatar-upload" accept="image/*" style="display:none" onchange="previewFile()">
            <button class="sec" onclick="document.getElementById('avatar-upload').click()">Fotoğraf Değiştir</button>
            <textarea id="my-bio-in" rows="3" placeholder="Biyografin..."></textarea>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button onclick="saveProfile()">Kaydet</button>
                <button class="danger" onclick="logout()">Çıkış</button>
                <button class="sec" onclick="closeModals()">Kapat</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="user-profile-modal">
        <div class="modal">
            <div class="avatar-circle" id="view-avatar">?</div>
            <h2 id="view-name" style="color:white; margin:0">...</h2>
            <p id="view-bio" style="color:#b9bbbe; margin-top:10px">...</p>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button id="dm-btn">Mesaj At</button>
                <button class="danger" id="block-btn">Engelle</button>
            </div>
            <button class="sec" style="width:100%; margin-top:10px" onclick="closeModals()">Kapat</button>
        </div>
    </div>

    <div class="modal-overlay" id="guild-modal"><div class="modal"><h3>Sunucu</h3><input type="text" id="g-in"><button onclick="socket.emit('create_guild',document.getElementById('g-in').value);closeModals()">Kur</button></div></div>
    <div class="modal-overlay" id="friend-modal"><div class="modal"><h3>Arkadaş Ekle</h3><input type="text" id="f-in"><button onclick="socket.emit('send_friend_request',document.getElementById('f-in').value);closeModals()">İstek Gönder</button><div id="pending-list" style="margin-top:15px"></div></div></div>

    <div id="app">
        <div id="guilds">
            <div class="guild-icon" onclick="showHome()">H</div>
            <div id="guild-list"></div>
            <div class="guild-icon" style="background:#3ba55d; color:white" onclick="openModal('guild-modal')">+</div>
        </div>
        <div id="channels">
            <div class="side-header">Arkadaşlar</div>
            <div id="side-list" style="flex:1"></div>
            <div class="user-footer" onclick="openMyProfile()">
                <div class="small-avatar" id="my-small-avatar"></div>
                <div style="flex:1">
                    <div id="my-name" style="color:white; font-size:14px; font-weight:bold">...</div>
                    <div style="color:#b9bbbe; font-size:11px">Profil Ayarları</div>
                </div>
            </div>
        </div>
        <div id="chat">
            <div class="side-header" id="chat-title">Hoş Geldin</div>
            <ul id="msg-list"></ul>
            <div class="msg-box"><input type="text" id="main-input" placeholder="Mesaj gönder..." onkeypress="sendMsg(event)"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "";
        let currentRoom = "";
        let base64Avatar = "";

        window.onload = () => {
            const saved = localStorage.getItem('challenger_user');
            if(saved) {
                myUser = saved;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('my-name').innerText = myUser;
                socket.emit('login_complete', myUser);
                showHome();
            }
        };

        function auth(type) {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            socket.emit('auth', { type, username: u, password: p });
            socket.once('auth_success', (data) => {
                if(document.getElementById('rem-check').checked) localStorage.setItem('challenger_user', data.username);
                location.reload();
            });
        }

        function logout() { localStorage.removeItem('challenger_user'); location.reload(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function previewFile() {
            const file = document.getElementById('avatar-upload').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                base64Avatar = reader.result;
                document.getElementById('my-avatar-preview').innerHTML = `<img src="${base64Avatar}">`;
            }
            if(file) reader.readAsDataURL(file);
        }

        function openMyProfile() {
            openModal('my-profile-modal');
            socket.emit('get_profile', myUser);
        }

        socket.on('profile_data', (data) => {
            if(data.username === myUser) {
                document.getElementById('my-bio-in').value = data.bio;
                if(data.avatar) document.getElementById('my-avatar-preview').innerHTML = `<img src="${data.avatar}">`;
            } else {
                document.getElementById('view-name').innerText = data.username;
                document.getElementById('view-bio').innerText = data.bio;
                document.getElementById('view-avatar').innerHTML = data.avatar ? `<img src="${data.avatar}">` : data.username[0];
                document.getElementById('dm-btn').onclick = () => { startDM(data.username); closeModals(); };
                openModal('user-profile-modal');
            }
        });

        function saveProfile() {
            socket.emit('update_profile', { bio: document.getElementById('my-bio-in').value, avatar: base64Avatar });
            closeModals();
        }

        function showHome() {
            document.getElementById('side-list').innerHTML = `<div class="list-item" onclick="openModal('friend-modal')" style="color:#3ba55d">+ Arkadaş Ekle</div><div id="friend-list"></div>`;
            socket.emit('login_complete', myUser);
        }

        socket.on('user_update', (data) => {
            const flist = document.getElementById('friend-list');
            if(flist) {
                flist.innerHTML = "";
                data.onlineFriends.forEach(f => {
                    const div = document.createElement('div');
                    div.className = "list-item";
                    div.innerHTML = `• ${f}`;
                    div.onclick = () => socket.emit('get_profile', f);
                    flist.appendChild(div);
                });
            }
            if(data.avatar) document.getElementById('my-small-avatar').innerHTML = `<img src="${data.avatar}">`;
            else document.getElementById('my-small-avatar').innerText = myUser[0];
        });

        function startDM(t) {
            const room = [myUser, t].sort().join('_');
            document.getElementById('chat-title').innerText = `@ ${t}`;
            joinRoom(`dm_${room}`);
        }

        function joinRoom(r) { currentRoom = r; document.getElementById('msg-list').innerHTML = ""; socket.emit('join_room', r); }
        function sendMsg(e) { if(e.key === 'Enter' && e.target.value.trim()){ socket.emit('chat_message', {user:myUser, text:e.target.value, room:currentRoom}); e.target.value=""; } }
        socket.on('chat_message', (d) => {
            const li = document.createElement('li');
            li.style.marginBottom="15px";
            li.innerHTML = `<strong style="color:white">${d.user}:</strong> <span style="color:var(--text)">${d.text}</span>`;
            document.getElementById('msg-list').appendChild(li);
        });

        socket.on('sys_msg', m => alert(m));
        socket.on('auth_error', m => document.getElementById('auth-err').innerText = m);
    </script>
</body>
</html>
