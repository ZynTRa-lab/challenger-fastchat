<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Challenger Pro</title>
    <style>
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: #36393f; color: #dcddde; font-family: 'Segoe UI', sans-serif; margin:0; display:flex; height:100vh; overflow:hidden; }
        
        #auth-screen { position:fixed; inset:0; background:#2f3136; z-index:1000; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:#36393f; padding:40px; border-radius:8px; width:400px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #app { display:none; flex:1; width:100%; }
        
        /* Sunucu Listesi */
        #guilds { width:72px; background:#202225; padding:12px 0; display:flex; flex-direction:column; align-items:center; gap:10px; border-right: 1px solid #1e1f22; }
        .guild-icon { width:48px; height:48px; background:#36393f; border-radius:50%; color:#dcddde; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; }
        .guild-icon:hover, .guild-icon.active { border-radius:15px; background:#5865f2; color:white; }

        /* Kanallar */
        #channels { width:240px; background:#2f3136; display:flex; flex-direction:column; }
        .side-header { padding:15px; font-weight:bold; color:white; border-bottom:1px solid #232428; display:flex; justify-content:space-between; align-items:center; }
        .list-item { padding:10px; margin:2px 8px; border-radius:4px; cursor:pointer; color:#8e9297; font-size:14px; display:flex; align-items:center; gap:8px; }
        .list-item:hover { background:#393c43; color:#dcddde; }
        .list-item.active { background:#4f545c; color:white; }

        /* Chat */
        #chat { flex:1; display:flex; flex-direction:column; background:#36393f; }
        #msg-list { flex:1; overflow-y:auto; padding:20px; list-style:none; margin:0; }
        .msg-box { padding:20px; }
        input { width:100%; background:#40444b; border:none; color:#dcddde; padding:12px; border-radius:8px; outline:none; }

        /* Profil */
        .user-footer { background:#232428; padding:10px; display:flex; align-items:center; gap:10px; margin-top:auto; }
        .avatar { width:32px; height:32px; background:#5865f2; border-radius:50%; }

        button { width:100%; padding:10px; background:#5865f2; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; margin-top:10px; }
        
        .status-dot { width:10px; height:10px; background:#3ba55d; border-radius:50%; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:white">Challenger</h2>
            <input type="text" id="user-in" placeholder="Kullanıcı Adı">
            <input type="password" id="pass-in" placeholder="Şifre" style="margin-top:10px">
            <button onclick="auth('login')">Giriş Yap</button>
            <button onclick="auth('register')" style="background:#4e5058">Kayıt Ol</button>
            <p id="error-msg" style="color:#f04747; font-size:12px"></p>
        </div>
    </div>

    <div id="app">
        <div id="guilds">
            <div class="guild-icon active" id="home-btn" onclick="showHome()" title="Arkadaşlar">H</div>
            <div id="guild-list"></div>
            <div class="guild-icon" style="background:#3ba55d; color:white" onclick="openGuildMenu()" title="Sunucu Seçenekleri">+</div>
        </div>

        <div id="channels">
            <div class="side-header" id="panel-title">Arkadaşlar</div>
            <div id="side-list" style="padding-top:10px"></div>
            
            <div class="user-footer">
                <div class="avatar"></div>
                <div>
                    <div id="my-name" style="color:white; font-size:14px; font-weight:bold">...</div>
                    <div style="color:#b9bbbe; font-size:11px">Çevrimiçi</div>
                </div>
            </div>
        </div>

        <div id="chat">
            <div class="side-header" id="chat-title">Hoş Geldin</div>
            <ul id="msg-list"></ul>
            <div class="msg-box">
                <input type="text" id="main-input" placeholder="Mesaj gönder..." onkeypress="sendMsg(event)">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "";
        let currentRoom = "";
        let isHome = true;

        function auth(type) {
            const username = document.getElementById('user-in').value;
            const password = document.getElementById('pass-in').value;
            socket.emit('auth', { type, username, password });
        }

        socket.on('auth_success', (data) => {
            myUser = data.username;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-name').innerText = myUser;
            socket.emit('login_complete', myUser);
            showHome();
        });

        socket.on('auth_error', (msg) => {
            document.getElementById('error-msg').innerText = msg;
        });

        // Sunucu Menüsü (2 Seçenek)
        function openGuildMenu() {
            const choice = prompt("1: Sunucu KUR\n2: Sunucuya KATIL\n(Sadece numara yaz kanka)");
            if(choice === "1") {
                const name = prompt("Kurulacak sunucu adı:");
                if(name) socket.emit('create_guild', name);
            } else if(choice === "2") {
                const name = prompt("Katılmak istediğin sunucu adı:");
                if(name) socket.emit('join_guild_request', name);
            }
        }

        // Ana Sayfa (Arkadaş Listesi)
        function showHome() {
            isHome = true;
            document.getElementById('panel-title').innerText = "Arkadaşlar";
            document.getElementById('side-list').innerHTML = `
                <div class="list-item" onclick="addFriendPrompt()" style="color:#3ba55d; font-weight:bold">+ Arkadaş Ekle</div>
                <div id="friend-list"></div>
            `;
            socket.emit('login_complete', myUser); // Verileri tazele
        }

        function addFriendPrompt() {
            const name = prompt("Eklemek istediğin arkadaşının adı:");
            if(name) socket.emit('add_friend', name);
        }

        socket.on('user_update', (data) => {
            if(isHome) {
                const flist = document.getElementById('friend-list');
                if(flist) {
                    flist.innerHTML = "";
                    data.onlineFriends.forEach(f => {
                        const div = document.createElement('div');
                        div.className = "list-item";
                        div.innerHTML = `<div class="status-dot"></div> ${f}`;
                        div.onclick = () => startDM(f);
                        flist.appendChild(div);
                    });
                }
            }
            // Sunucu listesini güncelle
            const glist = document.getElementById('guild-list');
            glist.innerHTML = "";
            data.guilds.forEach(g => {
                const div = document.createElement('div');
                div.className = "guild-icon";
                div.innerText = g.name[0].toUpperCase();
                div.onclick = () => openGuild(g.name);
                glist.appendChild(div);
            });
        });

        function startDM(target) {
            const room = [myUser, target].sort().join('_');
            document.getElementById('chat-title').innerText = `@ ${target}`;
            joinRoom(`dm_${room}`);
        }

        function openGuild(name) {
            isHome = false;
            document.getElementById('panel-title').innerText = name;
            document.getElementById('side-list').innerHTML = `<div class="list-item active"># genel</div>`;
            document.getElementById('chat-title').innerText = `# genel`;
            joinRoom(`guild_${name}`);
        }

        function joinRoom(room) {
            currentRoom = room;
            document.getElementById('msg-list').innerHTML = ""; 
            socket.emit('join_room', room);
        }

        socket.on('load_history', (messages) => {
            messages.forEach(msg => appendMsg(msg));
        });

        function sendMsg(e) {
            if(e.key === 'Enter' && e.target.value.trim() !== "") {
                socket.emit('chat_message', { user: myUser, text: e.target.value, room: currentRoom });
                e.target.value = "";
            }
        }

        socket.on('chat_message', (data) => appendMsg(data));

        function appendMsg(data) {
            const list = document.getElementById('msg-list');
            const li = document.createElement('li');
            li.style.display = "flex"; li.style.marginBottom = "20px";
            const time = new Date(data.timestamp || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            li.innerHTML = `
                <div style="width:40px; height:40px; background:#4f545c; border-radius:50%; margin-right:15px;"></div>
                <div>
                    <strong style="color:white; margin-right:8px">${data.user}</strong>
                    <span style="color:#72767d; font-size:12px">${time}</span>
                    <div style="color:#dcddde; margin-top:4px">${data.text}</div>
                </div>
            `;
            list.appendChild(li);
            list.scrollTop = list.scrollHeight;
        }

        socket.on('sys_msg', (msg) => alert(msg));
    </script>
</body>
</html>
