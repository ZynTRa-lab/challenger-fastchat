<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Challenger Pro</title>
    <style>
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background: #36393f; color: #dcddde; font-family: 'Segoe UI', sans-serif; margin:0; display:flex; height:100vh; overflow:hidden; }
        
        /* Auth */
        #auth-screen { position:fixed; inset:0; background:#2f3136; z-index:999; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:#36393f; padding:40px; border-radius:8px; width:400px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); text-align:center; }
        
        /* Layout */
        #app { display:none; flex:1; width:100%; }
        #guilds { width:72px; background:#202225; padding:12px 0; display:flex; flex-direction:column; align-items:center; gap:8px; }
        #channels { width:240px; background:#2f3136; display:flex; flex-direction:column; }
        #chat { flex:1; display:flex; flex-direction:column; background:#36393f; }

        /* Icons & Buttons */
        .guild-icon { width:48px; height:48px; background:#5865f2; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; }
        .guild-icon:hover { border-radius:15px; background:#4752c4; }

        .channel-btn { padding:8px 10px; margin:2px 8px; border-radius:4px; cursor:pointer; color:#8e9297; font-weight:500; }
        .channel-btn:hover { background:#393c43; color:#dcddde; }
        .channel-btn.active { background:#4f545c; color:white; }

        /* Chat Area */
        #msg-list { flex:1; overflow-y:auto; padding:20px; list-style:none; margin:0; }
        .msg-box { padding:20px; }
        input { width:100%; background:#40444b; border:none; color:#dcddde; padding:12px; border-radius:8px; outline:none; }
        
        /* User Footer (Profil Kısmı Burası) */
        .user-footer { background:#232428; padding:8px; display:flex; align-items:center; margin-top:auto; gap:10px; }
        .avatar { width:32px; height:32px; background:#5865f2; border-radius:50%; }
        .user-info { display:flex; flex-direction:column; overflow:hidden; }
        .user-name { color:white; font-size:14px; font-weight:bold; }
        .user-role { color:#b9bbbe; font-size:11px; }

        button { width:100%; padding:10px; background:#5865f2; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; margin-top:10px; }
        button:hover { background:#4752c4; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:white">Challenger'a Giriş</h2>
            <input type="text" id="user-in" placeholder="Kullanıcı Adı">
            <input type="password" id="pass-in" placeholder="Şifre" style="margin-top:10px">
            <button onclick="auth('login')">Giriş Yap</button>
            <button onclick="auth('register')" style="background:#4e5058">Kayıt Ol</button>
            <p id="error-msg" style="color:#f04747; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div id="app">
        <div id="guilds"><div class="guild-icon">C</div></div>
        <div id="channels">
            <div style="padding:15px; color:white; font-weight:bold; border-bottom:1px solid #232428">CHALLENGER SERVER</div>
            <div style="padding:15px 10px 5px; color:#8e9297; font-size:12px; font-weight:bold">METİN KANALLARI</div>
            <div class="channel-btn active" onclick="joinRoom('genel', this)"># genel</div>
            <div class="channel-btn" onclick="joinRoom('oyun', this)"># oyun</div>
            <div class="channel-btn" onclick="joinRoom('yardım', this)"># yardım</div>
            
            <div class="user-footer">
                <div class="avatar"></div>
                <div class="user-info">
                    <span class="user-name" id="my-name">...</span>
                    <span class="user-role" id="my-role">Üye</span>
                </div>
            </div>
        </div>
        <div id="chat">
            <ul id="msg-list"></ul>
            <div class="msg-box">
                <input type="text" id="main-input" placeholder="Mesaj gönder..." onkeypress="sendMsg(event)">
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "";
        let currentRoom = "genel";

        function auth(type) {
            const username = document.getElementById('user-in').value;
            const password = document.getElementById('pass-in').value;
            socket.emit('auth', { type, username, password });
        }

        socket.on('auth_success', (data) => {
            myUser = data.username;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-name').innerText = myUser;
            document.getElementById('my-role').innerText = data.role;
            joinRoom('genel');
        });

        socket.on('auth_error', (msg) => {
            document.getElementById('error-msg').innerText = msg;
        });

        function joinRoom(room, el) {
            currentRoom = room;
            document.getElementById('msg-list').innerHTML = ""; 
            socket.emit('join_room', room);
            if(el) {
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
        }

        socket.on('load_history', (messages) => {
            messages.forEach(msg => appendMsg(msg));
        });

        function sendMsg(e) {
            if(e.key === 'Enter' && e.target.value.trim() !== "") {
                socket.emit('chat_message', { user: myUser, text: e.target.value, room: currentRoom });
                e.target.value = "";
            }
        }

        socket.on('chat_message', (data) => appendMsg(data));

        function appendMsg(data) {
            const list = document.getElementById('msg-list');
            const li = document.createElement('li');
            li.style.display = "flex";
            li.style.marginBottom = "20px";
            const time = new Date(data.timestamp || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            li.innerHTML = `
                <div style="width:40px; height:40px; background:#4f545c; border-radius:50%; margin-right:15px;"></div>
                <div>
                    <strong style="color:white; margin-right:8px">${data.user}</strong>
                    <span style="color:#72767d; font-size:12px">${time}</span>
                    <div style="color:#dcddde; margin-top:4px">${data.text}</div>
                </div>
            `;
            list.appendChild(li);
            list.scrollTop = list.scrollHeight;
        }
    </script>
</body>
</html>
