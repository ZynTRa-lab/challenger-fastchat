<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Challenger Pro - Community</title>
    <style>
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background: #36393f; color: #dcddde; font-family: 'Segoe UI', sans-serif; margin:0; display:flex; height:100vh; overflow:hidden; }
        
        #auth-screen { position:fixed; inset:0; background:#2f3136; z-index:999; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:#36393f; padding:40px; border-radius:8px; width:400px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); text-align:center; }
        
        #app { display:none; flex:1; width:100%; }
        
        /* Sunucu Listesi (Guilds) */
        #guilds { width:72px; background:#202225; padding:12px 0; display:flex; flex-direction:column; align-items:center; gap:10px; border-right: 1px solid #1e1f22; }
        .guild-icon { width:48px; height:48px; background:#36393f; border-radius:50%; color:#dcddde; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; position:relative; }
        .guild-icon:hover { border-radius:15px; background:#5865f2; color:white; }
        .guild-icon.active { border-radius:15px; background:#5865f2; color:white; }

        /* Kanal Listesi */
        #channels { width:240px; background:#2f3136; display:flex; flex-direction:column; }
        .channel-header { padding:15px; font-weight:bold; color:white; border-bottom:1px solid #232428; display:flex; justify-content:space-between; }
        .channel-btn { padding:8px 10px; margin:2px 8px; border-radius:4px; cursor:pointer; color:#8e9297; font-weight:500; }
        .channel-btn:hover { background:#393c43; color:#dcddde; }
        .channel-btn.active { background:#4f545c; color:white; }

        /* Chat */
        #chat { flex:1; display:flex; flex-direction:column; background:#36393f; }
        #msg-list { flex:1; overflow-y:auto; padding:20px; list-style:none; margin:0; }
        .msg-box { padding:20px; }
        input { width:100%; background:#40444b; border:none; color:#dcddde; padding:12px; border-radius:8px; outline:none; }

        /* Kullanıcı Listesi (Sağ Panel) */
        #user-list-panel { width:240px; background:#2f3136; padding:20px 10px; }
        .user-item { padding:8px; border-radius:4px; cursor:pointer; display:flex; align-items:center; gap:10px; color:#8e9297; }
        .user-item:hover { background:#393c43; color:#dcddde; }
        .status-dot { width:10px; height:10px; background:#3ba55d; border-radius:50%; }

        /* Footer */
        .user-footer { background:#232428; padding:8px; display:flex; align-items:center; margin-top:auto; gap:10px; }
        .avatar { width:32px; height:32px; background:#5865f2; border-radius:50%; }

        button { width:100%; padding:10px; background:#5865f2; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; margin-top:10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color:white">Challenger</h2>
            <input type="text" id="user-in" placeholder="Kullanıcı Adı">
            <input type="password" id="pass-in" placeholder="Şifre" style="margin-top:10px">
            <button onclick="auth('login')">Giriş Yap</button>
            <button onclick="auth('register')" style="background:#4e5058">Kayıt Ol</button>
            <p id="error-msg" style="color:#f04747; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div id="app">
        <div id="guilds">
            <div class="guild-icon" onclick="joinRoom('Global Chat')" title="Global">G</div>
            <div id="server-list"></div>
            <div class="guild-icon" style="background:#3ba55d; color:white" onclick="createServer()" title="Sunucu Ekle">+</div>
        </div>

        <div id="channels">
            <div class="channel-header">
                <span id="current-server-name">Global Chat</span>
            </div>
            <div id="channel-list" style="padding-top:10px">
                <div class="channel-btn active" onclick="joinRoom('genel', this)"># genel</div>
            </div>
            
            <div class="user-footer">
                <div class="avatar"></div>
                <div style="overflow:hidden">
                    <div id="my-name" style="color:white; font-size:14px; font-weight:bold">...</div>
                    <div id="my-role" style="color:#b9bbbe; font-size:11px">Üye</div>
                </div>
            </div>
        </div>

        <div id="chat">
            <ul id="msg-list"></ul>
            <div class="msg-box">
                <input type="text" id="main-input" placeholder="Mesaj gönder..." onkeypress="sendMsg(event)">
            </div>
        </div>

        <div id="user-list-panel">
            <div style="color:#8e9297; font-size:12px; font-weight:bold; margin-bottom:10px; padding-left:8px">ÇEVRİMİÇİ — <span id="user-count">0</span></div>
            <div id="online-users"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUser = "";
        let currentRoom = "genel";

        function auth(type) {
            const username = document.getElementById('user-in').value;
            const password = document.getElementById('pass-in').value;
            socket.emit('auth', { type, username, password });
        }

        socket.on('auth_success', (data) => {
            myUser = data.username;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-name').innerText = myUser;
            document.getElementById('my-role').innerText = data.role;
            socket.emit('login_complete', myUser);
            joinRoom('genel');
        });

        socket.on('auth_error', (msg) => {
            document.getElementById('error-msg').innerText = msg;
        });

        function createServer() {
            const name = prompt("Sunucu İsmi Gir kanka:");
            if(name) socket.emit('create_server', { name, owner: myUser });
        }

        socket.on('load_guilds', (guilds) => {
            const list = document.getElementById('server-list');
            list.innerHTML = "";
            guilds.forEach(g => {
                const div = document.createElement('div');
                div.className = "guild-icon";
                div.innerText = g.icon;
                div.onclick = () => {
                    document.getElementById('current-server-name').innerText = g.name;
                    joinRoom(g.name);
                };
                list.appendChild(div);
            });
        });

        socket.on('user_update', (users) => {
            const list = document.getElementById('online-users');
            list.innerHTML = "";
            document.getElementById('user-count').innerText = users.length;
            users.forEach(u => {
                if(u === myUser) return;
                const div = document.createElement('div');
                div.className = "user-item";
                div.innerHTML = `<div class="status-dot"></div> ${u}`;
                div.onclick = () => startDM(u);
                list.appendChild(div);
            });
        });

        function startDM(targetUser) {
            const dmRoom = [myUser, targetUser].sort().join('_'); // dm_ali_veli
            document.getElementById('current-server-name').innerText = `@ ${targetUser}`;
            joinRoom(`dm_${dmRoom}`);
        }

        function joinRoom(room, el) {
            currentRoom = room;
            document.getElementById('msg-list').innerHTML = ""; 
            socket.emit('join_room', room);
            if(el) {
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
        }

        socket.on('load_history', (messages) => {
            messages.forEach(msg => appendMsg(msg));
        });

        function sendMsg(e) {
            if(e.key === 'Enter' && e.target.value.trim() !== "") {
                socket.emit('chat_message', { user: myUser, text: e.target.value, room: currentRoom });
                e.target.value = "";
            }
        }

        socket.on('chat_message', (data) => appendMsg(data));

        function appendMsg(data) {
            const list = document.getElementById('msg-list');
            const li = document.createElement('li');
            li.style.display = "flex";
            li.style.marginBottom = "20px";
            const time = new Date(data.timestamp || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            li.innerHTML = `
                <div style="width:40px; height:40px; background:#4f545c; border-radius:50%; margin-right:15px;"></div>
                <div>
                    <strong style="color:white; margin-right:8px">${data.user}</strong>
                    <span style="color:#72767d; font-size:12px">${time}</span>
                    <div style="color:#dcddde; margin-top:4px">${data.text}</div>
                </div>
            `;
            list.appendChild(li);
            list.scrollTop = list.scrollHeight;
        }
    </script>
</body>
</html>
